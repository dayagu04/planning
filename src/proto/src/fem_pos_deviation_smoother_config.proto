syntax = "proto2";

package planning;

message FemPosDeviationSmootherConfig {
  optional double weight_fem_pos_deviation = 1 [default = 1.0e10];
  optional double weight_ref_deviation = 2 [default = 1.0];
  optional double weight_path_length = 3 [default = 1.0];
  optional bool apply_curvature_constraint = 4 [default = false];
  optional double weight_curvature_constraint_slack_var = 5 [default = 1.0e2];
  optional double curvature_constraint = 6 [default = 0.2];
  optional bool use_sqp = 7 [default = false];
  optional double sqp_ftol = 8 [default = 1e-4];
  optional double sqp_ctol = 9 [default = 1e-4];
  optional int32 sqp_pen_max_iter = 10 [default = 10];
  optional int32 sqp_sub_max_iter = 11 [default = 100];

  // osqp settings
  optional int32 max_iter = 100 [default = 500];
  // time_limit set to be 0.0 meaning no time limit
  optional double time_limit = 101 [default = 0.0];
  optional bool verbose = 102 [default = false];
  optional bool scaled_termination = 103 [default = true];
  optional bool warm_start = 104 [default = true];
}
