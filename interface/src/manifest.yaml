      type: iflyauto::FmInfo
      desc: "a面故障信息(传给工控机)"
      desc_hz: "1Hz"
    - name: IflytekAlarmInfoFmBService
      mviz: /iflytek/alarm_info/fm_b_service
      type: iflyauto::FmInfo
      desc: "b面故障信息(传给工控机)"
      desc_hz: "1Hz"
    # 接口： 各模块故障上报接口，上报给fm_service
    # topic： /iflytek/alarm_info/模块名
    # 示例-状态机：/iflytek/alarm_info/finite_state_manager
    # 示例-片间通信：/iflytek/alarm_info/com_service_pnc_node
    # 头文件： 使用平台提供的接口头文件
    # 结构体： 使用平台提供的结构体
    # 上报时机： 故障发生时上报
    - name: IflytekAlarmInfoMcu
      mviz: /iflytek/alarm_info/mcu
      type: "底软内部维护"
      desc: "MCU故障上报汇总接口"
      desc_hz: "底软自行设计"
    - name: IflytekAlarmInfoSoc
      mviz: /iflytek/alarm_info/soc
      type: "底软内部维护"
      desc: "SOC故障上报汇总接口(适用于存在多片soc的情况,topic视情况扩展)"
      desc_hz: "底软自行设计"
  - name: hmi
    pports:
    - name: IflytekHmiInner
      mviz: /iflytek/hmi/inner
      type: iflyauto::HmiInner
      desc: "输出给fsm的hmi信息"
      desc_hz: "20Hz"
    - name: IflytekEngineerInner
      mviz: /iflytek/engineer/inner
      type: iflyauto::Engineer_Inner
      desc: "输出给fsm的工程模式信息"
      desc_hz: "20Hz"
    - name: IflytekHmiMcuToSocBswCheryT26Fdc
