    // OST_SIGN_NO_TURN_RIGHT                 = 66,  // 禁止向右转弯
    // OST_SIGN_NO_TURN_LEFT                  = 67,  // 禁止向左转弯
    // OST_SIGN_NO_HONK                       = 68,  // 禁止鸣喇叭
    // OST_SIGN_SLOW_ACCIDENT                 = 69,  // 慢行，事故易发路段
    // OST_SIGN_HIGH_LIMIT                    = 70,  // 限制高度
    // OST_SIGN_NO_TURN                       = 71,  // 禁止掉头
    // OST_SIGN_WEIGHT_GROSS_LIMIT            = 72,  // 限制重量、限制轴重
    // OST_SIGN_NO_ENTRY_PEDESTRIAN_NONMOTOR  = 73,   // 禁止行人，非机动车驶入
    // OST_SIGN_NO_ENTRY_MOTOR                = 74,  // 禁止机动车驶入
    // OST_SIGN_NONMOTOR_DRIVE_LANE           = 75,  // 非机动车道
    // OST_SIGN_BUS_BRT                       = 76,  // 公交线路专用车道
    // OST_SIGN_DISTRICT_SPEED_LIMIT_REMOVAL  = 77,  // 区域限制速度解除
    // OST_SIGN_NO_ENTRY_VECHICLE             = 78,  // 禁止机动车驶入
    // OST_SIGN_PARKING_INDICATOR             = 80,  // 停车相关指示
    // OST_SIGN_PEDESTRIAN                    = 81,  // 人行横道标牌

    // OST_SIGNAL_OTHER                       = 150, // 未分类交通灯
    // OST_SIGNAL_VEHICLE                     = 151, // 机动车信号灯
    // OST_SIGNAL_DIRECTION                   = 152, // 方向指示信号灯
    // OST_SIGNAL_LANE                        = 153, // 车道信号灯
    // OST_SIGNAL_NON_VEHICLE                 = 154, // 非机动车信号灯
    // OST_SIGNAL_PAVEMENT                    = 155, // 人行横道信号灯
    // OST_SIGNAL_WARNING                     = 156, // 闪光信号灯
    // OST_SIGNAL_JUNCTION                    = 157, // 道口信号灯

    // OST_POLE_OTHER                         = 200, // 其他杆
    // OST_POLE_TRAFFIC_SIGN                  = 201, // 交通信号杆
    // OST_POLE_GANTRY                        = 202, // 龙门架杆
    // OST_POLE_STREET_LIGHT                  = 203, // 路灯杆
    // OST_POLE_BARRIER_ROD                   = 204  // 挡杆
  }

  optional uint64 id = 1;                      //交通标志对象ID
  optional ObjectType object_type = 2;         // 类型
  optional ObjectSubType object_sub_type = 3;  // 子类型
  optional Common.PointLLH center = 4;         // 中心点位置
  optional uint32 height = 5;                  // 高度,单位：cm
  optional uint32 width = 6;                   // 宽度,单位：cm
  optional uint32 length = 7;                  // 长度,单位：cm
  optional LlhPoints llh_points = 8;    // 形状点集合，没有的话不带
  repeated uint64 lane_ids = 9;         // 关联车道ID集合
  optional CoordinateInfo points = 10;  // 其他格式的坐标点
}

message ObjectInfo {
  repeated Object objects = 1;  // 交通标志对象集合
}

// 腾讯地图车信信息，描述路口车道联通。SD级别全国覆盖
message LaneInfoMetaTx {
  optional uint64 node_id = 1;     // node_id
  optional uint64 inlink_id = 2;   // 进入link id
  repeated uint64 outlink_id = 3;  // 退出link序列
  optional int32 lane_num = 4;     // 车道数
  // 车道类型列表，车道从左到右存储
  repeated LaneTrafficInfoTx lane_infos = 5;
  optional int32 lane_num_l = 6;  // 左附加车道数
  optional int32 lane_num_r = 7;  // 右附加车道数
  // 车道转向拓扑。描述了每个转向方向的车道联通关系
  repeated LaneTopoTx lane_topos = 8;

  message LaneTrafficInfoTx {
    // 是否公交专用道
    optional bool is_bus = 1;
    // 车道类型，含义参考LaneExtensionTypeTx
    repeated LaneExtensionTypeTx lane_type = 2;
    // 箭头信息，含义参考LaneArrowTypeTx
    repeated LaneArrowTypeTx arrow = 3;
  }

  message LaneTopoTx {
    optional LaneArrowTypeTx lane_arrow = 1;  // 转向箭头
    // 生效车道，从左到右表示车道是否生效。从左1开始为1。例：左1左2生效，则为[1,2]
    repeated uint32 lane_seq = 2;
    // 是否仅公交车道生效，从左到右表示车道是否生效。从左1开始为1。例：左1左2生效，则为[1,2]
    repeated uint32 bus_flag = 3;
    repeated uint64 outlink_ids = 4;     // 退出线号，可空
    repeated LaneCondTx lane_conds = 5;  //车信条件
  }

  message LaneCondTx {
    // 生效车道，从左到右表示车道是否生效。从左1开始为1。例：左1左2生效，则为[1,2]
    repeated uint32 laneinfo_cond = 1;
    optional Direction direction = 2;     // 车道方向
    optional string data = 3;             // 时间段，可空
    repeated VehicleTypeTx vehicles = 4;  // 限制车辆类型，可空
    repeated SpecialTimeTypeTx special_times = 5;  // 特殊时间类型，可空
  }

  // 车道类型（车信信息扩展）
  enum LaneExtensionTypeTx {
    // 常规车道
    KNormal = 0x0000;
    // 公交车道
    KBus = 0x0001;
    // 无时段公交车道（复合车道）
    KMulti = 0x0002;  // 1 << 1
    // 加速车道
    KAccelerate = 0x0004;  // 1 << 2
    // 减速车道
    KDecelerate = 0x0008;  // 1 << 3
    // HOV车道
    KHov = 0x0010;  // 1 << 4
    // 快车道
    KFast = 0x0020;  // 1 << 5
    // 慢车道
    KSlow = 0x0040;  // 1 << 6
    // 超车道
    KOvertake = 0x0080;  // 1 << 7
    // 可行驶路前带
    KShoulder = 0x0100;  // 1 << 8
    // 卡车停车道
    KTruckstop = 0x0200;  // 1 << 9
    // 管制车道
    KControl = 0x0400;  // 1 << 10
    // 潮汐车道
    KTide = 0x0800;  // 1 << 11
    // 中心转向道
    KCenterturn = 0x1000;  // 1 << 12
    // 转向车道
    KTurn = 0x2000;  // 1 << 13
    // 空车道
    KBlank = 0x4000;  // 1 << 14
    // 可变车道
    KTurnalterable = 0x8000;  // 1 << 15
    // 借道左转车道
    KLeftbyway = 0x10000;  // 1 << 16
    // 其他
    KOthers = 0x20000;  // 1 << 17
    // 摩托车专用车道
    KMotorbike = 0x40000;  // 1 << 18
  }

  // 车道箭头信息（车信信息扩展）
  enum LaneArrowTypeTx {
    // 空白
    KLaneBlank = 0x00;
    // 直行
    KLaneStraight = 0x01;
    // 左转
    KLaneLeft = 0x02;  // 1 << 1
    // 右转
    KLaneRight = 0x04;  // 1 << 2
    // 左后转
    KLaneLeftRound = 0x08;  // 1 << 3
    // 右后转
    KLaneRightRound = 0x10;  // 1 << 4
    // 左斜前
    kLaneLeftDiagonalTurn = 0x20;  // 1 << 5
    // 右斜前
    kLaneRightDiagonalTurn = 0x40;  // 1 << 6
  }
  // 机动车类型
  enum VehicleTypeTx {
    NONE = 0;              // 未知
    CAR = 1;               // 小客车
    LOCAL_TRUCK = 2;       // 本地货车
    NONLOCAL_TRUCK = 3;    // 外地货车
    AMBULANCE = 4;         // 急救车
    TAXI = 5;              // 出租车
    BUS = 6;               // 公交车
    WALKER = 7;            // 步行者
    BICYCLE = 8;           // 自行车
    ELECTRIC_BICYCLE = 9;  // 电动自行车
    MOTORCYCLE = 10;       // 摩托车
    MULTI_PASSENGER = 11;  // 多人乘坐车辆
    WITH_TRAILER = 12;     // 拖挂车
    DANGEROUS = 13;        // 危险品车辆
    TRANSIT = 14;          // 过境车辆
    MINIVAN = 15;  // 小型货车（电动三轮车，拖拉机，三轮汽车）
    ALL = 16;      // 全部车辆
    LARGE_BUS = 17;     // 大型客车
    LARGE_TRUCK = 18;   // 大型货车
    OTHER = 19;         // 其它机动车辆
    ELECTRIC_CAR = 20;  // 电动小汽车
    LIGHT_TRUCK = 21;   // 轻型货车
    MINI_TRUCK = 22;    // 微型货车
    MEDIUM_TRUCK = 23;  // 中型货车
    HEAVY_TRUCK = 24;   // 重型货车
    EXTERNAL = 25;      // 外部车辆
  }

  enum SpecialTimeTypeTx {
    kNONE = 0;                  // 无特殊时间类型
    kWORKDAY = 1;               // 工作日
    kNOT_WORKDAY = 2;           // 工作日除外
    kNOT_HOLIDAY = 3;           // 节假日除外
    kHOLIDAY = 4;               // 节假日
    kICE = 5;                   // 冰、冰雹
    kSUNNY = 6;                 // 晴天
    kWIND = 7;                  // 风
    kFOG = 8;                   // 雾，雾霾
    kSNOW = 9;                  // 雪
    kRAIN = 10;                 // 雨
    kNOT_WORKING = 11;          // 施工期间除外
    kWORKING = 12;              // 施工期间
    kNOT_SCHOOL_OVER = 13;      // 放学期间除外
    kSCHOOL_OVER = 14;          // 放学期间
    kNOT_EVENING_PEAK = 15;     // 晚高峰除外
    kEVENING_PEAK = 16;         // 晚高峰
    kNOT_MORNING_PEAK = 17;     // 早高峰除外
    kMORNING_PEAK = 18;         // 早高峰
    kNOT_PEAK_SEASON = 19;      // 旺季除外
    kPEAK_SEASON = 20;          // 旺季
    kNOT_LOW_SEASON = 21;       // 淡季除外
    kLOW_SEASON = 22;           // 淡季
    kNOT_SUMMER_VACATION = 23;  // 暑假除外
    kSUMMER_VACATION = 24;      // 暑假
    kNOT_WINTER_VACATION = 25;  // 寒假除外
    kWINTER_VACATION = 26;      // 寒假
    kNOT_DRY_SEASON = 27;       // 干季除外
    kDRY_SEASON = 28;           // 干季
    kNOT_RAINY_SEASON = 29;     // 雨季除外
    kRAINY_SEASON = 30;         // 雨季
    kWINTER = 31;               // 冬季
    kAUTUMN = 32;               // 秋季
    kSUMMER = 33;               // 夏季
    kSPRING = 34;               // 春季
  }
}
