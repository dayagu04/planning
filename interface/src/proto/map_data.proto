/**
  sdpro地图信息定义
  topic: /iflytek/ehr/sdpromap_info
  频率： 1Hz
  结构体： MapData
  接口说明文档：
  https://yf2ljykclb.xfchat.iflytek.com/docx/doxrzLW35tuGTbZD3huoppzwgvc

*/

syntax = "proto2";

package iflymapdata.sdpro;

import "common.proto";

message MapData {
  optional Common.Header header = 1;  // 头信息
  optional LinkInfo link_info = 2;    // 道路信息
  optional LaneInfo lanes = 3;        // 车道信息
  optional RouteInfo route = 4;       // 路线信息
  // optional LaneBoundaryInfo boundary = 5;  // 车道边线信息
  optional JunctionInfo junction = 6;      // 路口信息
  optional ObjectInfo object = 7;          // 交通标志对象信息
  optional MapVendorType data_source = 8;  // 图商类型，数据来源
  optional NaviStatus navi_status = 9;     // 导航状态信息
}

enum MapVendorType {
  MAP_VENDOR_NONE = 0;
  MAP_VENDOR_BAIDU_LD = 1;        // 百度LD
  MAP_VENDOR_GAODE_LION = 2;      // 高德导航SD（雄狮）
  MAP_VENDOR_GAODE_SYNCORE = 3;   // 高德导航SD（星河）
  MAP_VENDOR_TENCENT_SD_PRO = 4;  // 腾讯SD Pro(即HD-Air)
}

message NaviStatus {
  enum NaviMode {
    NORMAL = 0;    //非导航非巡航模式
    NAVI = 1;      //真实导航模式
    NAVI_SIM = 2;  //模拟导航模式
    CRUISE = 3;    // 巡航模式
  }
  enum EnumNaviStatus {
    DEFAULT = 0;
    RUNNING = 1;  //导航进行中
    PAUSE = 2;    //导航暂停
  }
  optional uint32 mode = 1;    //导航模式，参看枚举NaviMode
  optional uint32 status = 2;  // 具体状态，参看枚举NaviStatus
}

message LlhPoints {
  repeated Common.PointLLH points = 1;  // 经纬高坐标点集合
}
message EnuPoints {
  repeated Common.PointENU points = 1;  // 东北天坐标点集合
}
message BootPoints {
  repeated Common.Point3d points = 1;  // 三维坐标点集合
}

// 复合形点类型，可以表示llh点集合或者enu点集合或者boot点集合
message CoordinateInfo {
  oneof pts {
    LlhPoints llh = 1;    // 经纬高坐标点集合
    EnuPoints enu = 2;    // 东北天坐标点集合
    BootPoints boot = 3;  // 三维坐标点集合
  }
}

// 复合点坐标类型，可以表示一个点的llh坐标或者enu坐标或者boot坐标
message PointCoordinateInfo {
  oneof p {
    Common.PointLLH llh = 1;  // 经纬高坐标点
    Common.PointENU enu = 2;  // 东北天坐标点
    Common.Point3d boot = 3;  // boot坐标点
  }
}

enum LinkClass {
  LC_NONE = 0;
  LC_EXPRESSWAY = 1;       // 高速公路
  LC_CITY_EXPRESSWAY = 2;  // 城市快速路
  LC_NATION_ROAD = 3;      // 国道
  LC_PROVINCE_ROAD = 4;    // 省道
  LC_COUNTRY_ROAD = 5;     // 县道
  LC_TOWN_ROAD = 6;        // 乡道
  LC_SPECIAL_ROAD = 7;     // 特服道路
  LC_WALK_ROAD = 8;        // 步行道路
  LC_PEOPLE_FERRY = 9;     // 人渡
  LC_FERRY = 10;           // 轮渡
  LC_OTHER_ROAD = 11;      // 其他道路
}

enum LinkType {
  LT_NORMAL = 0X00000000;               // 普通
  LT_TUNNEL = 0X00000001;               // 隧道
  LT_BRIDGE = 0X00000002;               // 桥
  LT_TOLLBOOTH = 0X00000004;            // 收费站道路
  LT_DEAD_END = 0X00000008;             // 断头路
  LT_IC = 0X00000010;                   // IC(高速连接普通路的道路)
  LT_JCT = 0X00000020;                  // JCT(高速连接高速的道路)
  LT_SAPA = 0X00000040;                 // SAPA(服务器、停车区道路)
  LT_WITHIN_INTERSECTION = 0X00000080;  // 路口内道路
  LT_AUTHORIZED = 0X00000100;           // 授权道路
  LT_TOLLGATE = 0X00000200;             // 收费岛道路
  LT_ABANDONED_TOLLGATE = 0X00000400;   // 废弃收费岛道路
  LT_CHECKPOINT = 0X00000800;           // 检查站道路
  LT_ROUNDABOUT = 0X00001000;           // 环岛内道路
  LT_SERRATED = 0X00002000;             // 锯齿道路
  LT_MAIN_ROAD = 0X00004000;            // 主路(main road)
  LT_SIDE_ROAD = 0X00008000;            // 辅路(side road)
  LT_MAINROAD_CONNECTION = 0X00010000;  // 主辅路连接路(mainside connection)
  LT_NO_S_INTERSECTION = 0X00020000;    // 无小路口
  LT_S_INTERSECTION_LEFT = 0X00040000;   // 小路口左侧道路
  LT_S_INTERSECTION_RIGHT = 0X00080000;  // 小路口右侧道路
  LT_S_INTERSECTION_BOTH = 0X00100000;   // 小路口两侧道路
  LT_INJUNCTION = 0X00200000;            // 路口内道路（编译计算）
  LT_BOOTH_EXIT = 0X00400000;            // 出口收费站
  LT_BOOTH_ENTRANCE = 0X00800000;        // 入口收费站
  LT_BOOTH_EXIT_ENTRANCE = 0X01000000;   // 出入口收费站
}

enum Direction {
  POSTIVE_DIRECTION = 1;         //正向行驶
  NEGATIVE_DIRECTION = 2;        //反向行驶
  BOTH_DIRECTIONS_PROHIBIT = 3;  // 双向禁止
  BOTH_DIRECTIONS = 4;           // 双向行驶
}
message LinkInfo {
  message Link {
    optional uint64 id = 1;             // link ID
    optional uint32 length = 2;         // 道路长度，单位cm
    optional uint32 speed_limit = 3;    // 车道限速，单位：km/h
    optional LlhPoints llh_points = 4;  // 形点-经纬高坐标点集合
    repeated uint32 offset = 5;  // 形点偏移，与shape_points一一对应。单位cm
    repeated int32 curvature = 6;               // ADAS信息——曲率
    repeated int32 slope = 7;                   // ADAS信息——坡度
    repeated int32 cross_slope = 8;             // ADAS信息——横向坡度
    repeated uint32 heading = 9;                // ADAS信息——朝向
    optional uint32 lane_num = 10;              // 车道数
    optional LinkClass link_class = 11;         // 道路等级
    optional uint32 link_type = 12;             // 见LinkType枚举
    optional Direction travel_direction = 13;   // 通行方向
    repeated uint64 lane_ids = 14;              // 车道ID列表
    repeated uint64 successor_link_ids = 15;    // 后继linkID列表
    repeated uint64 predecessor_link_ids = 16;  // 前驱linkID列表
    optional CoordinateInfo points = 17;        // 其他格式的坐标点
    /* 车道属性变化点,表示该link上的车道属性变化位置和变化详情 */
    repeated FeaturePoint feature_points = 18;
    /* 是否有红绿灯。有红绿灯：true；无红绿灯：false */
    optional bool traffic_light_exist = 19;
    /* link末端是否为路口。是路口:true; 非路口：false */
    optional bool cross_flag = 20;
    /* 红绿灯控制信息，表示红绿灯种类 */
    optional TrafficLightControlTx tfl_ctrl_info = 21;
    /* 点限速信息 */
    optional PointSpeedTx point_speed_info = 22;

    /* 腾讯地图路口车信信息 */
    repeated LaneInfoMetaTx lane_meta_info = 23;
  }
  repeated Link links = 1;
}

/* 红绿灯控制信息，表示红绿灯种类 */
message TrafficLightControlTx {
  enum TrafficLightCtrlType {
    kNone = 0;
    kUTurn = 1;       //掉头
    kBorrowLeft = 2;  // 借道左转
    kTurnRight = 3;   //右转
  }
  repeated TrafficLightCtrlType type = 1;  // 红绿灯控制类型
}

/* 点限速信息 */
message PointSpeedTx {
  enum PointSpeedType {  // 限速牌类型
    kNone = 0;           // 未指定限速类型
    kHighest = 1;        // 最高限速
    kLowest = 2;         // 最低限速
    kRelease = 3;        // 解除限速
    kCondition = 4;      // 条件限速
    kSuggest = 5;        // 建议
    kVariable = 6;       // 可变
  }
  message PointSpeed {
    optional PointSpeedType type = 1;  // 限速牌类型
    optional uint32 speed_limit = 2;   // 限速值
    optional uint32 pre_dist = 3;  // 提前预告距离，单位米，可空
    optional Common.PointLLH coordinate = 4;           // 坐标
    optional Direction direction = 5;                  // 作用方向
    optional PointCoordinateInfo coordinate_info = 6;  // 其他坐标
  }
  repeated PointSpeed point_speeds = 1;
}

enum FeaturePointType {
  NONE = 0;
  LANE_TYPE_CHANGE = 1;                // 车道类型变化
  LANE_COUNT_CHANGE = 2;               // 车道数变化
  DATA_BOUNDARY_START = 3;             // 数据边界开始
  DATA_BOUNDARY_END = 4;               // 数据边界结束
  LANE_CONTINUITY_POINT = 5;           // 车道连续点
  EXCHANGE_AREA_START = 6;             // 交换区起点
  EXCHANGE_AREA_END = 7;               // 交换区终点
  REGULAR_INTERSECTION_ENTRANCE = 8;   // 普通路口进入点
  REGULAR_INTERSECTION_EXIT = 9;       // 普通路口退出点
  U_TURN_INTERSECTION_ENTRANCE = 10;   // 掉头路口进入点
  U_TURN_INTERSECTION_EXIT = 11;       // 掉头路口退出点
  WIDE_LANE_ENTRANCE = 12;             // 宽车道进入点
  WIDE_LANE_EXIT = 13;                 // 宽车道退出点
  TOLL_BOOTH_ENTRANCE = 14;            // 收费站进入点
  TOLL_BOOTH_EXIT = 15;                // 收费站退出点
  EXCHANGE_AREA_INTERIOR_POINT = 16;   // 交换区内点
  WIDE_LANE_INTERIOR_POINT = 17;       // 宽车道内点
  TOLL_BOOTH_INTERIOR_POINT = 18;      // 收费站内点
  MARKING_LINE_CHANGE_POINT = 19;      // 标线变化点
  T_INTERSECTION_ENTRANCE_POINT = 20;  // T型路口进入点
};
// 车道属性变化点，绑定在link上
message FeaturePoint {
  optional uint64 id = 1;
  repeated FeaturePointType type = 2;
  optional double projection_percent =
      3;  // 投影百分比，0-1之间，表示该点在link上的位置
  optional Common.PointLLH location = 4;  // 该点的坐标信息
  optional PointCoordinateInfo location_info = 5;  // 该点的坐标信息，其他格式
  repeated uint64 lane_ids = 6;  // 该点关联的车道ID列表
}

enum LaneType {
  LAT_NORMAL = 0;                   // 普通
  LAT_ENTRY = 1;                    // 入口
  LAT_EXIT = 2;                     // 出口
  LAT_EMERGENCY = 3;                // 应急车道
  LAT_ON_RAMP = 4;                  // 进入匝道
  LAT_OFF_RAMP = 5;                 // 退出匝道
  LAT_CONNECT_RAMP = 6;             // 连接匝道
  LAT_ACCELERATE = 7;               // 加速车道
  LAT_DECELERATE = 8;               // 减速车道
  LAT_EMERGENCY_PARKING_STRIP = 9;  // 紧急停车带
  LAT_CLIMBING = 10;                // 爬坡车道
  LAT_ESCAPE = 11;                  // 避险车道
  LAT_DEDICATED_CUSTOMS = 12;       // 海关专用车道
  LAT_VIEWING_PLATFROM = 13;        // 观景台车道
  LAT_PARALLEL_LANE = 14;           // 平行车道
  LAT_DIVERSION = 17;               // 导流区车道
  LAT_PARKING = 19;                 // 停车车道
  LAT_LEFT_TURN_AREA = 20;          // 左转等待车道
  LAT_VARIABLE_LANE = 21;           // 可变车道
  LAT_NON_MOTOR_LANE = 22;          // 非机动车道
  LAT_BUS_STOP = 23;                // 公交停靠站
  LAT_NO_ENTRY_LANE = 24;           // 不可行驶车道
  LAT_U_TURN_LANE = 25;             // 掉头车道
  LAT_RIGHT_TURN_LANE = 26;         // 右转专用车道
  LAT_ETC_LANE = 28;                // ETC车道
  LAT_MANUAL_TOLL_LANE = 29;        // 人工收费车道
  LAT_PLAZA_LANE = 30;              // 收费站外广场车道
  LAT_HARBOR_STOP = 31;             // 港湾停靠站
  LAT_RIGHT_TURN_AREA = 32;         // 右转等待车道
  LAT_U_TURN_AREA = 33;             // 掉头等待车道
  LAT_NO_TURN_AREA = 34;            // 直行等待车道
  LAT_VIRTUAL_CONNECTED_LANE = 35;  // 虚拟连接车道
};

enum TurnDirection {
  TURNDIR_STRAIGHT = 0x01;  // 直行
  TURNDIR_LEFT = 0x02;      // 左转
  TURNDIR_RIGHT = 0x04;     // 右转
  TURNDIR_LU_TURN = 0x08;   // 左掉头
  TURNDIR_RU_TURN = 0x10;   // 右掉头
}

enum LaneTransitionType {
  LTS_NONE = 0;             // 普通
  LTS_MERGE = 1;            // 合流
  LTS_LANE_ADD_RIGHT = 12;  // 右侧车道增加
  LTS_LANE_ADD_LEFT = 13;   // 左侧车道增加
}

enum LaneConnectionType {
  LAN_STATUS_NORMAL = 0X00;    // 正常
  LAN_STATUS_FORMING = 0x02;   // 新生
  LAN_STATUS_ENDING = 0x04;    // 消亡
  LAN_STATUS_SPLITING = 0x10;  // 分流
  LAN_STATUS_MERGING = 0x20;   // 合流
};

message Lane {
  optional uint64 id = 1;
  optional uint64 link_id = 2;
  optional uint32 sequence = 3;  // 车道序号，从1开始，从右向左递增。
  repeated LaneType lane_type = 4;
  optional Direction travel_direction = 5;
  optional uint32 min_speed = 6;  // 车道最小限速，单位：km/h
  optional uint32 max_speed = 7;  // 车道最大限速，单位：km/h
  optional uint32 min_width = 8;  // 车道最小宽度，单位：cm。有则携带，无则不带
  optional uint32 max_width = 9;  // 车道最大宽度，单位：cm。有则携带，无则不带
  optional uint32 average_width = 10;         //车道平均宽度，单位：cm
  optional uint32 length = 11;                //车道长度，单位：cm
  optional LlhPoints llh_points = 12;         // 形点-经纬高坐标点集合
  repeated uint32 offset = 13;                // 形点偏移，单位：cm
  repeated uint64 successor_lane_ids = 14;    // 后继车道ID列表
  repeated uint64 predecessor_lane_ids = 15;  // 前继车道ID列表
  optional uint32 current_direction =
      16;  // 当前车道行驶方向，参考TurnDirection
  optional uint32 plan_direction = 17;  // 当前车道计划转向，参考TurnDirection
  optional LaneTransitionType lane_transiton = 18;
  optional LaneConnectionType lane_connection = 19;
  repeated LaneBoundary left_boundaries = 20;   // 左边线集合
  repeated LaneBoundary right_boundaries = 21;  // 右边线集合
  optional CoordinateInfo points = 22;          // 其他格式的坐标点
  optional LaneChangeType change_type = 23;  // 车道变化类型，腾讯地图属性。
  optional uint32 start_width = 24;  // 车道起始宽度，单位cm。有则携带，无则不带
  optional uint32 end_width = 25;  // 车道结束宽度，单位cm。有则携带，无则不带
  optional LslType lsl_type = 26;  // 车道边线长实线情况

  enum LslType {
    LSL_NONE = 0;     // 无长实线
    LSL_LEFT = 1;     // 左侧长实线
    LSL_RIGHT = 2;    // 右侧长实线
    LSL_BOTH = 3;     // 两侧长实线
    LSL_UNKNOWN = 4;  // 未调查
  }
}

enum LaneChangeType {
  LeftTurnExpandingLane = 1;       // 左向扩展车道
  RightTurnExpandingLane = 2;      // 右向扩展车道
  LeftTurnMergingLane = 3;         // 左向汇入车道
  RightTurnMergingLane = 4;        // 右向汇入车道
  BothDirectionExpandingLane = 5;  // 双向扩展车道
  BothDirectionMergingLane = 6;    // 双向汇入车道
  OtherLane = 7;                   // 其他
  NotApplicable = 99;              // 不适用
}

message LaneInfo {
  repeated Lane lanes = 1;
}

message LaneBoundary {
  enum DividerType {
    DIVIDER_TYPE_NONE = 0x00;              // 无
    DIVIDER_TYPE_BOLLARD = 0x01;           // 短柱
    DIVIDER_TYPE_FENCE = 0x02;             // 栅栏
    DIVIDER_TYPE_CONE = 0x04;              // 锥形警告路标
    DIVIDER_TYPE_JUMA = 0x08;              // 拒马路障
    DIVIDER_TYPE_SPEED_HUMP = 0x10;        // 减速标线
    DIVIDER_TYPE_ACCESS_DIVERSION = 0x20;  // 出入口导流区边线
    DIVIDER_TYPE_SPECIAL_VEHICLE = 0x40;   // 专用车道线
  }
  enum DivederMarkingType {
    DMT_MARKING_NONE = 0;                               // 无属性
    DMT_MARKING_LONG_DASHED_LINE = 1;                   // 长虚线
    DMT_MARKING_DOUBLE_SOLID_LINE = 2;                  // 双实线
    DMT_MARKING_SINGLE_SOLID_LINE = 3;                  // 单实线
    DMT_MARKING_RIGHT_SOLID_LINE_LEFT_DASHED_LINE = 4;  // 右实左虚线
    DMT_MARKING_LEFT_SOLID_LINE_RIGHT_DASHED_LINE = 5;  // 左实右虚线
    DMT_MARKING_DOUBLE_DASHED_LINE = 9;                 // 双虚线
    DMT_MARKING_VIRTUAL_FIT = 22;  // 虚拟边线（编译）
    DMT_MARKING_VIRTUAL = 23;      // 虚拟边线（生产）
  }
  enum BoundaryWidth {
    BW_15_CM = 15;
    BW_45_CM = 45;
  }
  optional uint64 id = 1;
  optional uint32 divider_type = 2;  // 车道边线类型，参考DividerType
  optional DivederMarkingType divider_marking_type = 3;  // 车道边线虚实线型
  optional uint32 width = 4;  // 车道边线宽度，单位：cm, 参考BoundaryWidth
  optional uint32 length = 5;          // 车道边线长度，单位：cm
  optional LlhPoints llh_points = 6;   // 车道边线形点集合
  optional CoordinateInfo points = 7;  // 其他格式的坐标点
}

message LaneBoundaryInfo {
  repeated LaneBoundary boundaries = 1;
}

message RouteInfo {
  enum MainAction {
    MAIN_ACTION_NULL = 0;             //无基本导航动作
    MAIN_ACTION_TURN_LEFT = 1;        //左转
    MAIN_ACTION_TURN_RIGHT = 2;       //右转
    MAIN_ACTION_SLIGHT_LEFT = 3;      //向左前方行驶
    MAIN_ACTION_SLIGHT_RIGHT = 4;     //向右前方行驶
    MAIN_ACTION_TURN_HARDLEFT = 5;    //向左后方行驶
    MAIN_ACTION_TURN_HARD_RIGHT = 6;  //向右后方行驶
    MAIN_ACTION_UTURN = 7;            //左转调头
    MAIN_ACTION_CONTINUE = 8;         //直行
    MAIN_ACTION_MERGE_LEFT = 9;       //靠左
    MAIN_ACTION_MERGE_RIGHT = 10;     //靠右
    MAIN_ACTION_ENTRY_RING = 11;      //进入环岛
    MAIN_ACTION_LEAVE_RING = 12;      //离开环岛
    MAIN_ACTION_SLOW = 13;            //减速行驶
    MAIN_ACTION_PLUG_CONTINUE = 14;   //插入直行
    MAIN_ACTION_ENTER_BUILDING = 65;  //进入建筑物
    MAIN_ACTION_LEAVE_BUILDING = 66;  //离开建筑物
    MAIN_ACTION_BY_ELEVATOR = 67;     //电梯换层
    MAIN_ACTION_BY_STAIR = 68;        //楼梯换层
    MAIN_ACTION_BY_ESCALATOR = 69;    //扶梯换层
    MAIN_ACTION_COUNT = 70;           //导航主动作最大个数
  }
  enum AssistantAction {
    ASSI_ACTION_NULL = 0;                     //无辅助导航动作
    ASSI_ACTION_ENTRY_MAIN = 1;               //进入主路
    ASSI_ACTION_ENTRY_SIDE_ROAD = 2;          //进入辅路
    ASSI_ACTION_ENTRY_FREE_WAY = 3;           //进入高速
    ASSI_ACTION_ENTRY_SLIP = 4;               //进入匝道
    ASSI_ACTION_ENTRY_TUNNEL = 5;             //进入隧道
    ASSI_ACTION_ENTRY_CENTER_BRANCH = 6;      //进入中间岔道
    ASSI_ACTION_ENTRY_RIGHT_BRANCH = 7;       //进入右岔路
    ASSI_ACTION_ENTRY_LEFT_BRANCH = 8;        //进入左岔路
    ASSI_ACTION_ENTRY_RIGHT_ROAD = 9;         //进入右转专用道
    ASSI_ACTION_ENTRY_LEFT_ROAD = 10;         //进入左转专用道
    ASSI_ACTION_ENTRY_MERGE_CENTER = 11;      //进入中间道路
    ASSI_ACTION_ENTRY_MERGE_RIGHT = 12;       //进入右侧道路
    ASSI_ACTION_ENTRY_MERGE_LEFT = 13;        //进入左侧道路
    ASSI_ACTION_ENTRY_MERGE_RIGHT_SILD = 14;  //靠右行驶进入辅路
    ASSI_ACTION_ENTRY_MERGE_LEFT_SILD = 15;   //靠左行驶进入辅路
    ASSI_ACTION_ENTRY_MERGE_RIGHT_MAIN = 16;  //靠右行驶进入主路
    ASSI_ACTION_ENTRY_MERGE_LEFT_MAIN = 17;   //靠左行驶进入主路
    ASSI_ACTION_ENTRY_MERGE_RIGHT_RIGHT = 18;  //靠右行驶进入右转专用道
    ASSI_ACTION_ENTRY_FERRY = 19;              //到达航道
    ASSI_ACTION_LEFT_FERRY = 20;               //驶离轮渡
    ASSI_ACTION_ALONG_ROAD = 23;               //沿当前道路行驶
    ASSI_ACTION_ALONG_SILD = 24;               //沿辅路行驶
    ASSI_ACTION_ALONG_MAIN = 25;               //沿主路行驶
    ASSI_ACTION_ARRIVE_EXIT = 32;              //到达出口
    ASSI_ACTION_ARRIVE_SERVICE_AREA = 33;      //到达服务区
    ASSI_ACTION_ARRIVE_TOLLGATE = 34;          //到达收费站
