message Junction {
  enum JunctionType {
    // JUNCTION_TYPE_JUNCTION = 0;             // 汇入汇出
    // JUNCTION_TYPE_GATEWAY = 1;              //
    JUNCTION_TYPE_CROSS = 2;  // 路口
    // JUNCTION_TYPE_ROUNDABOUT = 3;           // 环岛
    // JUNCTION_TYPE_U_TURN = 4;               // 掉头口
    // JUNCTION_TYPE_LANE_MERGE = 5;           // 车道合流
    // JUNCTION_TYPE_LANE_SPLIT = 6;           // 车道分流
    // JUNCTION_TYPE_ROAD_DEAD_END = 7;        // 断头路路口
    // JUNCTION_TYPE_GATEWAY_WITHIN_CITY = 8;  // 城市内连接
    JUNCTION_TYPE_TOOLGATE = 9;  // 收费站
    // JUNCTION_TYPE_NOA = 100;                // NOA Junction
  }
  message LaneLink {
    optional uint64 from_lane_id = 1;  // 关联的进入车道ID
    optional uint64 to_lane_id = 2;    // 关联的退出车道ID
  }
  message JunctionConnection {
    optional uint64 from_link_id = 1;  // 关联的进入道路id
    optional uint64 to_link_id = 2;    // 关联的退出道路id
    repeated LaneLink lane_links = 3;  // 连接的车道信息
  }
  optional uint64 id = 1;                       // 路口ID
  optional JunctionType type = 2;               // type
  optional LlhPoints llh_points = 3;            // 路口形状点集合
  repeated JunctionConnection connections = 4;  // 路口连接关系
  repeated uint64 lane_ids = 5;                 // 路口车道ID集合
  optional CoordinateInfo points = 6;           // 其他格式的坐标点
}
message JunctionInfo {
  repeated Junction junctions = 1;
}

