syntax = "proto3";
package autopilot;

// 时间戳统计信息
message InputHistoryTimestamp {
  // 输入数据类型
  enum InputHistoryTimestampSourceType {
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_PANORAMA_VIEW_CAMERA_NODE                     = 0;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_AROUND_VIEW_CAMERA_NODE                       = 1;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_RADAR_FM_PERCEPTION                           = 2;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_RADAR_FL_PERCEPTION                           = 3;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_RADAR_FR_PERCEPTION                           = 4;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_RADAR_RL_PERCEPTION                           = 5;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_RADAR_RR_PERCEPTION                           = 6;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_IMU                                           = 7;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_GNSS                                          = 8;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_USS_WAVE                                      = 9;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_VIHECLE_SERVICES                              = 10;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_COM_SERVICE                                   = 11;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_HMI_SERVICE_MCU_INNER                         = 12;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_HMI_SERVICE_SOC_INNER                         = 13;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_SD_MAP_SERVICE                                = 14;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_BSW_RESERVE1                                  = 15;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_BSW_RESERVE2                                  = 16;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_PANORAMA_VIEW_CAMERA_PERCEPTION_OBJ           = 20;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_PANORAMA_VIEW_CAMERA_PERCEPTION_OCCUPANCY_OBJ = 21;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_PANORAMA_VIEW_CAMERA_PERCEPTION_LANELINE      = 22;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_PANORAMA_VIEW_CAMERA_PERCEPTION_RESERVE1      = 23;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_PANORAMA_VIEW_CAMERA_PERCEPTION_RESERVE2      = 24;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_AROUND_VIEW_PERCEPTION                        = 25;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_AROUND_VIEW_PERCEPTION_RESERVE1               = 26;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_AROUND_VIEW_PERCEPTION_RESERVE2               = 27;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_USS_PERCEPTION                                = 28;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_USS_PERCEPTION_RESERVE1                       = 29;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_OBSTACLE_FUSION                               = 40;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_MEGA                                          = 41;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_STATIC_FUSION                                 = 42;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_FUSION_RESERVE1                               = 43;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_LOCALIZATION                                  = 44;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_LOCALIZATION_RESERVE1                         = 45;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_PLANNING                                      = 50;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_PLANNING_HMI                                  = 51;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_PREDICTION                                    = 52;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_CONTROL                                       = 53;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_STATE_MACHINE                                 = 60;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_HMI_OUT                                       = 61;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_HMI_RESERVE1                                  = 62;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_HMI_RESERVE2                                  = 63;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_EHR                                           = 70;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_MAP                                           = 71;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_SYS_RESERVE1                                  = 100;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_SYS_RESERVE2                                  = 101;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_SYS_RESERVE3                                  = 102;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_SYS_RESERVE4                                  = 103;
    INPUT_HISTORY_TIMESTAMP_SOURCE_TYPE_SYS_RESERVE5                                  = 104;
  }
  InputHistoryTimestampSourceType input_type = 1;  // 时间戳来源模块
  uint64 seq                                 = 2;  // 接收数据的seq，用于离线排查整个链路的数据情况
};

// 信息头结构
message Header {
  uint64 timestamp                          = 1;  // 仅表示本次消息发送时刻的时间戳，不可表示某项数据产生时间戳     (微秒)
  string version                            = 2;  // 模块版本, eg:fsm(module_name)_12345678(commit_id[8位]):hmi_12345678
  repeated InputHistoryTimestamp input_list = 3;  // 输入数据时间戳历史
  uint64 seq                                = 4;  // 信息发送序号, 从0开始，每次发topic计数+1
};

message Point2f {
  float x = 1;
  float y = 2;
};

message Point3f {
  float x = 1;
  float y = 2;
  float z = 3;
};

message Point3d {
  double x = 1;
  double y = 2;
  double z = 3;
};

enum PosType {
  POS_TYPE_EGO_CENTER     = 0;   // 自车压住的线    <感知可能给不出>
  POS_TYPE_EGO_RIGHT      = 1;   // 右侧第一条线
  POS_TYPE_ADJACENT_RIGHT = 2;   // 右侧第二条线
  POS_TYPE_THIRD_RIGHT    = 3;   // 右侧第三条线
  POS_TYPE_FOURTH_RIGHT   = 4;   // 右侧第四条线
  POS_TYPE_CURB_RIGHT     = 5;   // 右侧道路边沿
  POS_TYPE_OTHER          = 6;   // 其他
  POS_TYPE_UNKNOWN        = 7;   // 未知
  POS_TYPE_EGO_LEFT       = 11;  // 左侧第一条线
  POS_TYPE_ADJACENT_LEFT  = 12;  // 左侧第二条线
  POS_TYPE_THIRD_LEFT     = 13;  // 左侧第三条线
  POS_TYPE_FOURTH_LEFT    = 14;  // 左侧第四条线
  POS_TYPE_CURB_LEFT      = 15;  // 左侧道路边沿
};

// 车道线类型
enum LineType {
  LINE_TYPE_UNKNOWN              = 0;   // 未知线型
  LINE_TYPE_LANELINE             = 1;   // 车道线
  LINE_TYPE_BORDERLINE           = 2;   // 边沿线，物理隔离障碍物统称
  LINE_TYPE_CENTER               = 3;   // 双向道路的道路中心线
  LANE_LINE_TYPE_GUARDRAIL       = 4;   // 护栏
  LANE_LINE_TYPE_CONCRETEBARRIER = 5;   // 水泥护栏
  LANE_LINE_TYPE_FENCE           = 6;   // 栅栏
  LANE_LINE_TYPE_WALL            = 7;   // 墙
  LANE_LINE_TYPE_CANOPY          = 8;   // 绿植
  LANE_LINE_TYPE_CONE            = 9;   // 锥形桶
  LANE_LINE_TYPE_STOPLINE        = 10;  // 停止线
  LANE_LINE_TYPE_INHIBITLINE     = 11;  // 禁止线
};

message LineSegment {
  double a0        = 1;  // 车道线方程常数项
  double a1        = 2;  // 车道线方程一次项
  double a2        = 3;  // 车道线方程二次项
  double a3        = 4;  // 车道线方程三次项
  float begin      = 5;  // 起点             (米)
  float end        = 6;  // 终点             (米)
  float confidence = 7;  // 车道线置信度     [0.0-1.0]
};

// 车道线虚实类型
enum LaneBoundaryType {
  LaneBoundaryType_MARKING_UNKNOWN                 = 0;  /* 未知线型 */
  LaneBoundaryType_MARKING_DASHED                  = 1;  /* 虚线 */
  LaneBoundaryType_MARKING_SOLID                   = 2;  /* 实线 */
  LaneBoundaryType_MARKING_SHORT_DASHED            = 3;  /* 短虚线 */
  LaneBoundaryType_MARKING_DOUBLE_DASHED           = 4;  /* 双虚线 */
  LaneBoundaryType_MARKING_DOUBLE_SOLID            = 5;  /* 双实线 */
  LaneBoundaryType_MARKING_LEFT_DASHED_RIGHT_SOLID = 6;  /* 左虚右实线 */
  LaneBoundaryType_MARKING_LEFT_SOLID_RIGHT_DASHED = 7;  /* 左实右虚线 */
  LaneBoundaryType_MARKING_DECELERATION            = 8;  /* 减速线 */
  LaneBoundaryType_MARKING_VIRTUAL                 = 9;  /* 虚拟线 */
  LaneBoundaryType_MARKING_WAITLINE                = 10; /* 待转线 */
  LaneBoundaryType_MARKING_DECELERATION_DASHED     = 11; /* 减速虚线 */
  LaneBoundaryType_MARKING_DECELERATION_SOLID      = 12; /* 减速实线 */
};

message MarkingSegment {
  LaneBoundaryType marking = 1;  // 线型
  float begin              = 2;  // 起点     (米)
  float end                = 3;  // 终点     (米)
};

// 车道线颜色类型
enum LaneLineColor {
  LaneLineColor_COLOR_UNKNOWN                 = 0;  /* 未知 */
  LaneLineColor_COLOR_WHITE                   = 1;  /* 白色 */
  LaneLineColor_COLOR_YELLOW                  = 2;  /* 黄色 */
  LaneLineColor_COLOR_BLUE                    = 3;  /* 蓝色 */
  LaneLineColor_COLOR_GREEN                   = 4;  /* 绿色 */
  LaneLineColor_COLOR_GRAY                    = 5;  /* 灰色 */
  LaneLineColor_COLOR_ORANGE                  = 6;  /* 橘色 */
  LaneLineColor_COLOR_LEFT_GRAY_RIGHT_YELLOW  = 7;  /* 左侧车道线灰色，右侧车道线黄色 */
  LaneLineColor_COLOR_LEFT_YELLOW_RIGHT_WHITE = 8;  /* 左侧车道线黄色，右侧车道线白色 */
  LaneLineColor_COLOR_RED                     = 9;  /* 红色 */
  LaneLineColor_COLOR_RAINBOW                 = 10; /* 彩色 */
};

message ColorSegment {
  LaneLineColor color = 1;  // 车道线颜色
  float begin         = 2;  // 起点     (米)
  float end           = 3;  // 终点     (米)
};

// 车道转向类型
enum LaneDrivableDirection {
  LaneDrivableDirection_DIRECTION_UNKNOWN              = 0;   // 未知
  LaneDrivableDirection_DIRECTION_STRAIGHT             = 1;   // 直行
  LaneDrivableDirection_DIRECTION_STRAIGHT_RIGHT       = 2;   // 直行加右转
  LaneDrivableDirection_DIRECTION_RIGHT                = 3;   // 右转
  LaneDrivableDirection_DIRECTION_STRAIGHT_LEFT        = 4;   // 直行加左转
  LaneDrivableDirection_DIRECTION_LEFT                 = 5;   // 左转
  LaneDrivableDirection_DIRECTION_UTURN_LEFT           = 6;   // 调头加左转
  LaneDrivableDirection_DIRECTION_UTURN_RIGHT          = 7;   // 调头加右转
  LaneDrivableDirection_DIRECTION_STRAIGHT_LEFT_RIGHT  = 8;   // 直行加左转加右转
  LaneDrivableDirection_DIRECTION_STRAIGHT_UTURN_LEFT  = 9;   // 直行加左调头
  LaneDrivableDirection_DIRECTION_STRAIGHT_UTURN_RIGHT = 10;  // 直行加右调头
  LaneDrivableDirection_DIRECTION_STRAIGHT_OFF_ROUTE   = 11;  // 直行加左转加左掉头
  LaneDrivableDirection_DIRECTION_LEFT_UTURN           = 12;  // 左调头
  LaneDrivableDirection_DIRECTION_RIGHT_UTURN          = 13;  // 右调头
  LaneDrivableDirection_DIRECTION_NO_UTURN             = 14;  // 禁止调头
  LaneDrivableDirection_DIRECTION_LEFT_RIGHT           = 15;  // 左转加右转
  LaneDrivableDirection_DIRECTION_LEFT_MERGE           = 16;  // 左侧汇流
  LaneDrivableDirection_DIRECTION_RIGHT_MERGE          = 17;  // 右侧汇流
  LaneDrivableDirection_DIRECTION_CROSS_LINE           = 18;  // 人行横道
};

// 车道类型
enum LaneType {
  LANETYPE_UNKNOWN                  = 0;   // 未知类型
  LANETYPE_NORMAL                   = 1;   // 常规车道
  LANETYPE_VIRTUAL                  = 2;   // 虚拟车道
  LANETYPE_PARKING                  = 3;   // 车位线
  LANETYPE_ACCELERATE               = 4;   // 加速车道
  LANETYPE_DECELERATE               = 5;   // 减速车道
  LANETYPE_BUS                      = 6;   // 公交车道
  LANETYPE_EMERGENCY                = 7;   // 应急车道
  LANETYPE_ACCELERATE_DECELERATE    = 8;   // 加减速车道
  LANETYPE_LEFT_TURN_WAITTING_AREA  = 9;   // 左转弯待转区
  LANETYPE_NON_MOTOR                = 10;  // 非机动车道
  LANETYPE_HOV                      = 11;  // HOV
  LANETYPE_SLOW                     = 12;  // 慢车道
  LANETYPE_SHOULDER                 = 13;  // 路肩
  LANETYPE_DRIVABLE_SHOULDER        = 14;  // 可行驶路肩
  LANETYPE_CONTROL                  = 15;  // 管制车道
  LANETYPE_EMERGENCY_PARKING_STRIP  = 16;  // 紧急停车带
  LANETYPE_TIDE                     = 17;  // 潮汐车道
  LANETYPE_DIRECTION_CHANGE         = 18;  // 可变车道
  LANETYPE_DRIVABLE_PARKING_ROAD    = 19;  // 可行驶停车道
  LANETYPE_TRUCK                    = 20;  // 货车专用道
  LANETYPE_TIME_LIMIT_BUS           = 21;  // 限时公交车道
  LANETYPE_PASSING_BAY              = 22;  // 错车道
  LANETYPE_REVERSAL_LEFT_TURN       = 23;  // 借道左转车道
  LANETYPE_TAXI                     = 24;  // 出租车车道
  LANETYPE_DIRECTION_LOCKED         = 25;  // 定向车道
  LANETYPE_VEHICLE_BICYCLE_MIX      = 26;  // 机非混合车道
  LANETYPE_MOTOR                    = 27;  // 摩托车道
  LANETYPE_U_TURN                   = 28;  // 掉头车道
  LANETYPE_TOLL                     = 29;  // 收费站车道
  LANETYPE_CHECK_POINT              = 30;  // 检查站车道
  LANETYPE_DANGEROUS_ARTICLE        = 31;  // 危险品专用车道
  LANETYPE_FORBIDDEN_DRIVE          = 32;  // 非行驶区域
  LANETYPE_THOUGH_LANE_ZONE         = 33;  // 借道区
  LANETYPE_STREET_RAILWAY           = 34;  // 有轨电车车道
  LANETYPE_BUS_BAY                  = 35;  // 公交港湾车道
  LANETYPE_SPECIAL_CAR              = 36;  // 特殊车辆专用车道
  LANETYPE_PEDESTRIANS              = 37;  // 人行道
  LANETYPE_ETC                      = 38;  // ETC车道
  LANETYPE_RAMP                     = 39;  // 斜坡
  LANETYPE_RIGHT_TURN_WAITTING_AREA = 40;  // 右转弯待转区
  LANETYPE_BRANCH                   = 41;  // 岔道
};

// 车道类型信息
message LaneTypeMsg {
  double begin  = 1;  // 起点             (米)
  double end    = 2;  // 终点             (米)
  LaneType type = 3;  // 车道类型
};

// 车道分合流方向类型
enum LaneOrientation {
  LaneOrientation_ORIENTATION_UNKNOWN = 0;
  LaneOrientation_ORIENTATION_LEFT    = 1;
  LaneOrientation_ORIENTATION_RIGHT   = 2;
};

// 车道分合流信息
message LaneMergeSplitPointData {
  double distance             = 1;  // 自车后轴中心到该分合流点起始位置距离     (米)
  float length                = 2;  // 该分合流长度                           (米)
  bool is_split               = 3;  // 该参考线是否为分流                     (true:yes / false:no)
  bool is_continue            = 4;  // 该参考线是否占路权                     (true:yes / false:no)
  LaneOrientation orientation = 5;  // 车道分合流方向
  Point3d point               = 6;  // 分合流点
};

// 通用障碍物类型
enum ObjectType {
  OBJECT_TYPE_UNKNOWN              = 0;   // 未知障碍物
  OBJECT_TYPE_UNKNOWN_MOVABLE      = 1;   // 未知可移动障碍物
  OBJECT_TYPE_UNKNOWN_IMMOVABLE    = 2;   // 未知不可移动障碍物
  OBJECT_TYPE_COUPE                = 3;   // 轿车
  OBJECT_TYPE_MINIBUS              = 4;   // 面包车
  OBJECT_TYPE_VAN                  = 5;   // 厢式轿车
  OBJECT_TYPE_BUS                  = 6;   // 大型客车
  OBJECT_TYPE_TRUCK                = 7;   // 卡车
  OBJECT_TYPE_TRAILER              = 8;   // 拖车
  OBJECT_TYPE_BICYCLE              = 9;   // 自行车
  OBJECT_TYPE_MOTORCYCLE           = 10;  // 摩托车
  OBJECT_TYPE_TRICYCLE             = 11;  // 三轮车
  OBJECT_TYPE_PEDESTRIAN           = 12;  // 行人
  OBJECT_TYPE_ANIMAL               = 13;  // 动物
  OBJECT_TYPE_TRAFFIC_CONE         = 14;  // 交通锥
  OBJECT_TYPE_TRAFFIC_BARREL       = 15;  // 隔离墩
  OBJECT_TYPE_TRAFFIC_TEM_SIGN     = 16;  // 临时指示牌
  OBJECT_TYPE_FENCE                = 17;  // 栅栏
  OBJECT_TYPE_CYCLE_RIDING         = 18;  // 人骑着自行车
  OBJECT_TYPE_MOTORCYCLE_RIDING    = 19;  // 人骑着摩托车
  OBJECT_TYPE_TRICYCLE_RIDING      = 20;  // 人骑着三轮车
  OBJECT_TYPE_WATER_SAFETY_BARRIER = 21;  // 水马
  OBJECT_TYPE_CTASH_BARREL         = 22;  // 防撞桶
  OBJECT_TYPE_SOLT                 = 23;  // 泊车-车位; context = IdpParkingEntranceType | IdpParkingEntranceStatusType | ...
  OBJECT_TYPE_DECELER              = 24;  // 泊车-减速带
  OBJECT_TYPE_SPECIFICATIONER      = 25;  // 泊车-地锁; context = IdpParkingEntranceStatusType | ...
  OBJECT_TYPE_LIMITER              = 26;  // 泊车-限位器
  OBJECT_TYPE_COLUMN               = 27;  // 柱子

  OBJECT_TYPE_PICKUP              = 40;  // 皮卡
  OBJECT_TYPE_SUV                 = 41;  // SUV
  OBJECT_TYPE_MPV                 = 42;  // MPV
  OBJECT_TYPE_ENGINEERING_VEHICLE = 43;  // 工程车
  OBJECT_TYPE_ADULT               = 47;  // 成人
  OBJECT_TYPE_TRAFFIC_POLICE      = 48;  // 交警
  OBJECT_TYPE_CHILD               = 49;  // 儿童

  //占用网络类型
  OBJECT_TYPE_OCC_EMPTY           = 50;
  OBJECT_TYPE_OCC_GENERAL         = 51;  // 通用障碍物，除 CAR; CYCLIST; PEOPLE; 以外的其他所有物体
  OBJECT_TYPE_OCC_CAR             = 52;  // 车
  OBJECT_TYPE_OCC_CYCLIST         = 53;  // 二轮车
  OBJECT_TYPE_OCC_PEOPLE          = 54;  // 人
  OBJECT_TYPE_OCC_GENERAL_STATIC  = 55;  // 静态大类，所有静态物体
  OBJECT_TYPE_OCC_GENERAL_DYNAMIC = 56;  // 动态大类，所有动态物体
  OBJECT_TYPE_OCC_GROUDING_WIRE   = 57;  // 接地线大类，IdpContextOccupancyGroudingWireClass 墙的接地线，柱子接地线，路沿
  OBJECT_TYPE_OCC_COLUMN          = 58;  // 柱子
  OBJECT_TYPE_OCC_WALL            = 59;  // 墙
  OBJECT_TYPE_OCC_NUM             = 60;
};

// 障碍物运动状态
enum ObjectMotionType {
  OBJECT_MOTION_TYPE_UNKNOWN = 0;  // 未知
  OBJECT_MOTION_TYPE_STATIC  = 1;  // 静止
  OBJECT_MOTION_TYPE_STOPED  = 2;  // 停止
  OBJECT_MOTION_TYPE_MOVING  = 3;  // 同向
  OBJECT_MOTION_TYPE_ONCOME  = 4;  // 对向
  OBJECT_MOTION_TYPE_CROSS   = 5;  // 横穿
};

// 障碍物灯光状态
enum ObjectLightType {
  OBJECT_LIGHT_TYPE_UNKNOWN                    = 0;   // 无
  OBJECT_LIGHT_TYPE_TURN_LEFT                  = 1;   // 左转
  OBJECT_LIGHT_TYPE_TURN_RIGHT                 = 2;   // 右转
  OBJECT_LIGHT_TYPE_DOUBLE_FLASH               = 3;   // 双闪
  OBJECT_LIGHT_TYPE_BRAKE                      = 4;   // 刹车灯
  OBJECT_LIGHT_TYPE_REVERSE                    = 5;   // 倒车灯
  OBJECT_LIGHT_TYPE_BRAKE_REVERSE              = 6;   // 刹车灯+倒车灯
  OBJECT_LIGHT_TYPE_TURN_LEFT_BRAKE            = 7;   // 左转+刹车灯
  OBJECT_LIGHT_TYPE_TURN_LEFT_REVERSE          = 8;   // 左转+倒车灯
  OBJECT_LIGHT_TYPE_TURN_LEFT_BRAKE_REVERSE    = 9;   // 左转+刹车灯+倒车灯
  OBJECT_LIGHT_TYPE_TURN_RIGHT_BRAKE           = 10;  // 右转+刹车灯
  OBJECT_LIGHT_TYPE_TURN_RIGHT_REVERSE         = 11;  // 右转+倒车灯
  OBJECT_LIGHT_TYPE_TURN_RIGHT_BRAKE_REVERSE   = 12;  // 右转+刹车灯+倒车灯
  OBJECT_LIGHT_TYPE_DOUBLE_FLASH_BRAKE         = 13;  // 双闪+刹车灯
  OBJECT_LIGHT_TYPE_DOUBLE_FLASH_REVERSE       = 14;  // 双闪+倒车灯
  OBJECT_LIGHT_TYPE_DOUBLE_FLASH_BRAKE_REVERSE = 15;  // 双闪+刹车灯+倒车灯
  OBJECT_LIGHT_TYPE_RESERVE                    = 16;  // 预留
};

message Shape3d {
  double length = 1;  // 长  (米)
  double width  = 2;  // 宽  (米)
  double height = 3;  // 高  (米)
};

enum StaticFusionResourceType {
  RESOURCE_TYPE_INVALID          = 0;  // 无效的
  RESOURCE_TYPE_MAP              = 1;  // 来源于地图
  RESOURCE_TYPE_REAL_TIME_FUSION = 2;  // 来源于实时建图融合
};

// 单个限位器信息
message ParkingFusionLimiter {
  uint32 id                              = 1;  // 属性标识id信息
  StaticFusionResourceType resource_type = 2;  // 数据来源
  repeated Point2f end_points            = 3;  // 车体限位器端点位置 （米） <固定2个> FUSION_PARKING_SLOT_LIMITER_POINT_NUM
};

// 点击车位后，发送泊车预规划状态
enum PreparePlanningState {
  PREPARE_PLANNING_NONE      = 0;  // 空值，正式泊车按钮不能点击
  PREPARE_PLANNING_COMPUTING = 1;  // 计算中，正式泊车按钮不能点击
  PREPARE_PLANNING_SUCCESS   = 2;  // 计算成功，泊车按钮可以点击
