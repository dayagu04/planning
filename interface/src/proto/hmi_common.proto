};

message PosEnu {
  bool available = 1;  // 是否可用
  double e       = 2;  // e 轴方向上的位置
  double n       = 3;  // n 轴方向上的位置
  double u       = 4;  // u 轴方向上的位置
};

// 位置(LLH坐标系，开机坐标系)
message Position {
  PosGlobal position_llh = 1;  // LLH坐标系下的位置信息
  PosLocal position_boot = 2;  // 开机坐标系下的位置信息
  PosEnu position_enu    = 3;  // body坐标系下的位置信息
};

// LLH信息
message PointLLH {
  double lon    = 1;  // Longitude in degrees     (度)    [-180,180)
  double lat    = 2;  // Latitude in degrees      (度)    [-90,90]
  double height = 3;  // WGS-84 ellipsoid height in meters    (米)
};

// ENU信息
message PointENU {
  double x = 1;  // East from the origin         (米)
  double y = 2;  // North from the origin        (米)
  double z = 3;  // Up from the WGS-84 ellipsoid (米)
};

// 旋转四元数
message Quaternion {
  double w = 1;  // 四元数的实部，标量部分
  double x = 2;  // 四元数的虚部 i 分量
  double y = 3;  // 四元数的虚部 j 分量
  double z = 4;  // 四元数的虚部 k 分量
};

// 后视镜请求信息
enum RearViewMirrorSignalType {
  REAR_VIEW_MIRROR_NONE   = 0;  // 无指令
  REAR_VIEW_MIRROR_FOLD   = 1;  // 折叠后视镜
  REAR_VIEW_MIRROR_UNFOLD = 2;  // 展开后视镜
};

// 规划后视镜请求
message RearViewMirrorCommand {
  bool available                                  = 1;  // 挡位请求有效性。   (true:有效/false:无效)
  RearViewMirrorSignalType rear_view_mirror_value = 2;  // 后视镜折叠请求值
};

message RiskObjInfo {
  bool obj_valid                    = 1;   // false:invalid true:valid
  uint32 id                         = 2;   // 障碍物id
  ObjectType type                   = 3;   // 障碍物类型
  ObjectLightType light_type        = 4;   // 障碍物灯光状态
  Shape3d shape                     = 5;   // 障碍物尺寸
  Point3f relative_velocity         = 6;   // 障碍物相对自车坐标系相对速度 (米/秒)
  Point3f relative_acceleration     = 7;   // 障碍物相对自车坐标系相对加速度 (米/秒^2)
  Point3f relative_center_position  = 8;   // 障碍物几何中心距离自车后轴中心的距离 (米)
  float relative_heading_angle      = 9;   // 障碍物与自车的相对朝向角 单位：弧度rad 备注：沿自车坐标系x轴正向逆时针旋转为正（0~Π），顺时针为负（0~-Π）
  float relative_heading_angle_rate = 10;  // 障碍物与自车的相对朝向角变化率 (弧度rad/秒)
};

