/*******************************************************************************
 * planning调试信息
 * topic：/iflytek/planning/debug_info
 * 频率：10Hz
 *******************************************************************************/

syntax = "proto2";

package planning.common;

import "task_basic_types.proto";
import "vision_only_lateral_behavior_planner.proto";
import "vision_only_lateral_motion_planner.proto";
import "environment_model_debug_info.proto";
import "lateral_motion_planner.proto";
import "longitudinal_motion_planner.proto";
import "lat_behavior_common.proto";
import "scene_type_config.proto";
import "slot_management_info.proto";
import "real_time_lon_behavior_planner.proto";
import "lon_behavior_planner.proto";
import "lateral_behavior_planner.proto";
import "lateral_path_optimizer.proto";
import "gap_selector.proto";
import "basic_types.proto";
import "generated_refline.proto";
import "lateral_offset_decider_info.proto";
import "st_search_decider.proto";
import "st_graph.proto";
import "st_graph_searcher.proto";
import "lon_target_maker.proto";
import "hybrid_ara_star.proto";
import "lane_borrow_decider.proto";
import "apa_debug_data.proto";
import "dp_road_graph.proto";
import "spatio_temporal_union_plan.proto";
import "spatio_temporal_union_dp_input.proto";

message TopicTimeList {
  optional uint64 fusion_object = 1;
  optional uint64 fusion_road = 2;
  optional uint64 localization_estimate = 3; // 废弃
  optional uint64 prediction = 4;
  optional uint64 vehicle_service = 5;
  optional uint64 radar_perception = 6;
  optional uint64 control_output = 7;
  optional uint64 hmi = 8;
  optional uint64 parking_fusion = 9;
  optional uint64 function_state_machine = 10;
  optional uint64 map = 11;
  optional uint64 ehr_parking_map = 12;
  optional uint64 ground_line = 13;
  optional uint64 localization = 14;
  optional uint64 uss_wave = 15;
  optional uint64 uss_perception = 16;
  optional uint64 fusion_occupancy_object = 17;
  optional uint64 perception_tsr = 18;
  optional uint64 fusion_speed_bump = 19;
  optional uint64 sd_map = 20;
  optional uint64 sdpro_map = 21;
  optional uint64 perception_scene = 22;
}

message FrameInfo {
  optional uint64 frame_num = 1;
  optional string version = 2;
  optional string scene_type = 3;
  optional uint64 frame_duration_ms = 4;
  optional bool planning_succ = 5;
}

message ImageLatency {
  optional uint64 image_com_latency_ms = 1;       // 相机曝光-感知收到 图像传输耗时
  optional uint64 perception_latency_ms = 2;      // 感知收到-感知输出 感知耗时
  optional uint64 perception_com_latency_ms = 3;  // 感知输出-融合收到 感知传输耗时
  optional uint64 fusion_lantency_ms = 4;         // 融合收到-融合输出 融合耗时
  optional uint64 fusion_com_lantency_ms = 5;     // 融合输出-规划收到 融合传输耗时
}

message LocationLatency {
  optional uint64 sensor_mcu_latency_ms = 1;   // 传感器/底盘-MCU发出 MCU传输耗时
  optional uint64 sensor_soc_latency_ms = 2;   // MCU发出-SOC收到 片间通讯传输耗时
  optional uint64 sensor_com_latency_ms = 3;   // SOC发出-定位收到 SOC传输耗时
  optional uint64 location_latency = 4;        // 定位收到-定位发出 定位耗时
}

message VersionCommit {
  optional string planning_commit = 1;
  optional string interface_commit = 2;
  optional string adcommon_commit = 3;
}

message PlanningDebugInfo {
  optional uint64 timestamp = 1;  // us
  // TBD: 存在多条candidates时，应该使用repeated
  // TBD: lat behavior
  // TBD: lat motion
  optional LonRefPath long_ref_path = 2;  // long behavior
  optional LateralPlanningInput lateral_motion_planning_input = 3;
  optional LateralPlanningOutput lateral_motion_planning_output = 4;
  optional LongitudinalPlanningInput longitudinal_motion_planning_input = 5;
  optional LongitudinalPlanningOutput longitudinal_motion_planning_output = 6;
  optional LatBehaviorCommon lat_behavior_common = 7;
  optional VOLatBehaviorPlan vo_lat_behavior_plan = 8;
  optional VOLatMotionPlan vo_lat_motion_plan = 9;
  optional EnvironmentModelInfo environment_model_info = 10;

  optional TopicTimeList input_topic_timestamp = 11;
  optional TopicTimeList input_topic_latency = 12;
  optional FrameInfo frame_info = 13;
  optional ImageLatency road_fusion_latency = 14 [deprecated = true];
  optional ImageLatency obstacle_fusion_latency = 15 [deprecated = true];
  optional LocationLatency location_latency = 16 [deprecated = true];
  optional string data_json = 18;

  optional SlotManagementInfo slot_management_info = 19;
  optional RealTimeLonBehaviorInput real_time_lon_behavior_planning_input = 20;

  optional LateralBehaviorDebugInfo lateral_behavior_debug_info = 21;
  optional LateralPathOptimizerInput lateral_path_optimizer_input = 22;
  optional LateralPathOptimizerOutput lateral_path_optimizer_output = 23;
  optional GapSelectorInput gap_selector_input = 24;
  optional GapSelectorReplayInfo gap_selector_replay_info = 25;
  repeated TrajectoryPoint refline_info = 26;
  repeated ReferenceLine generated_refline_info = 27;
  optional LateralOffsetDeciderInfo lateral_offset_decider_info = 28;
  optional ApaPathDebug apa_path_debug = 29;
  optional StSearchDeciderInfo st_search_decider_info = 30;
  optional StGraphData st_graph_data = 31;
  optional StGraphSearcher st_graph_searcher = 32;
  optional TargetMaker lon_target_s_ref = 33;
  optional LaneBorrowDeciderInfo lane_borrow_decider_info = 34;
  optional ApaSpeedDebug apa_speed_debug = 35;
  optional WeightMaker weight_maker = 36;
  optional HybridARAInfo hybrid_ara_info = 37;
  repeated DoublePair dis_curv_list = 38;
  optional DPRoadInfo dp_road_info = 39;
  repeated ApaPathPoint cur_path_points = 40;
  repeated ApaPathPoint complete_path_points = 41;
  optional SpatioTemporalUnionPlan spatio_temporal_union_plan = 42;
  optional SpationTemporalUnionDpInput spatio_temporal_union_plan_input = 43;
  optional VersionCommit version_commit = 44;
}
