syntax = "proto2";

package planning.common;

// 自车初始状态
message EgoInitState {
  optional double x = 1;
  optional double y = 2;
  optional double theta = 3;
  optional double delta = 4;
  optional double vel = 5;
  optional double acc = 6;
}

// 障碍物初始状态
message ObsInitState {
  optional double x = 1;
  optional double y = 2;
  optional double theta = 3;
  optional double delta = 4;
  optional double vel = 5;
  optional double acc = 6;
}

// 障碍物参考轨迹
message ObsRefTrajectory {
  repeated double ref_x_vec = 1;
  repeated double ref_y_vec = 2;
  repeated double ref_theta_vec = 3;
  repeated double ref_delta_vec = 4;
  repeated double ref_vel_vec = 5;
  repeated double ref_acc_vec = 6;
  repeated double ref_s_vec = 7;
  optional double length = 8;
  optional double width = 9;
  optional int32 longitudinal_label = 10;
  optional int32 obs_id = 11;
  optional double init_s = 12;
  repeated double curv_factor_vec = 13;
  
}

// 道路边界
message BoundaryPoint {
  repeated double x_vec = 1;
  repeated double y_vec = 2;
}

// 联合优化求解器输入
message JointMotionPlanningInput {
  // 自车初始状态
  optional EgoInitState ego_init_state = 1;
  
  // 障碍物信息
  optional int32 obs_num = 2;
  repeated ObsInitState obs_init_state = 3;
  repeated ObsRefTrajectory obs_ref_trajectory = 4;
  
  // 自车参考轨迹
  repeated double ref_x_vec = 5;
  repeated double ref_y_vec = 6;
  repeated double ref_theta_vec = 7;
  repeated double ref_delta_vec = 8;
  repeated double ref_vel_vec = 9;
  repeated double ref_acc_vec = 10;
  repeated double ref_s_vec = 11;

  // 自车参考权重
  optional double q_ego_ref_x = 12;
  optional double q_ego_ref_y = 13;
  optional double q_ego_ref_theta = 14;
  optional double q_ego_ref_delta = 15;
  optional double q_ego_ref_vel = 16;
  optional double q_ego_ref_acc = 17;
  optional double q_ego_ref_s = 18;

  // 障碍物参考权重
  optional double q_obs_ref_x = 19;
  optional double q_obs_ref_y = 20;
  optional double q_obs_ref_theta = 21;
  optional double q_obs_ref_delta = 22;
  optional double q_obs_ref_vel = 23;
  optional double q_obs_ref_acc = 24;
  optional double q_obs_ref_s = 25;

  // 曲率因子
  repeated double curv_factor_vec = 26;

  // 安全约束
  optional double three_disc_safe_dist = 27;
  optional double q_three_disc_safe_dist_weight = 28;

  // 道路边界
  optional BoundaryPoint left_road_boundary = 29;
  optional BoundaryPoint right_road_boundary = 30;

  // 道路边界约束
  optional double road_boundary_safe_dist = 31;
  optional double q_road_boundary_weight = 32;

  // 加速度权重
  optional double q_ego_acc_weight = 33;

  // 加加速度权重
  optional double q_ego_jerk_weight = 34;

  // 角速度控制量权重
  optional double q_ego_omega_weight = 35;

  // 自车转向角权重
  optional double q_ego_delta_weight = 36;

  // 障碍物加加速度权重
  optional double q_obs_jerk_weight = 37;

  // 障碍物角速度权重
  optional double q_obs_omega_weight = 38;

  // 自车加速度边界权重
  optional double q_ego_acc_bound_weight = 39;

  // 自车加速度边界
  repeated double ego_acc_max = 40;
  repeated double ego_acc_min = 41;

  // 自车加加速度边界权重
  optional double q_ego_jerk_bound_weight = 42;

  // 自车加加速度边界
  repeated double ego_jerk_max = 43;
  repeated double ego_jerk_min = 44;

  // 硬半平面约束权重
  optional double q_hard_halfplane_weight = 45;

  // 硬半平面约束参数
  optional double hard_halfplane_dist = 46;
  optional double halfplane_cost_allocation_ratio = 47;

  // 软半平面约束权重
  optional double q_soft_halfplane_weight = 48;
  optional double soft_halfplane_s0 = 49;
  optional double soft_halfplane_tau = 50; 
  optional double soft_halfplane_cost_allocation_ratio = 51;

  // 自车尺寸参数
  optional double ego_length = 52;
  optional double ego_width = 53;
}

// 障碍物优化轨迹
message ObsOptTrajectory {
  repeated double x_vec = 1;
  repeated double y_vec = 2;
  repeated double theta_vec = 3;
  repeated double vel_vec = 4;
  repeated double acc_vec = 5;
  repeated double delta_vec = 6;
  repeated double omega_vec = 7;
  repeated double jerk_vec = 8;
  repeated double s_vec = 9;
}

// 联合优化求解器输出
message JointMotionPlanningOutput {
  repeated double time_vec = 1;
  repeated double x_vec = 2;
  repeated double y_vec = 3;
  repeated double theta_vec = 4;
  repeated double vel_vec = 5;
  repeated double acc_vec = 6;
  repeated double delta_vec = 7;
  repeated double jerk_vec = 8;
  repeated double omega_vec = 9;
  repeated double s_vec = 10;
  repeated ObsOptTrajectory obs_opt_trajectory = 11;
  optional JointOptimizationSolverInfo solver_info = 12;
}

// 联合优化求解器单次迭代信息
message JointOptimizationSolverIterationInfo {
  optional bool linesearch_success = 1;
  optional uint32 backward_pass_count = 2;
  optional double lambda = 3;
  optional double cost = 4;
  optional double dcost = 5;
  optional double expect = 6;
  optional double du_norm = 7;
}

// 联合优化求解器信息
message JointOptimizationSolverInfo {
  optional uint32 solver_condition = 1;
  optional uint32 cost_size = 2;
  optional uint32 iter_count = 3;
  optional double init_cost = 4;
  repeated JointOptimizationSolverIterationInfo iter_info = 5;
  repeated double cost_vec = 6;
}