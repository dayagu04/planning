syntax = "proto2";

package planning;

message ApaSpeedSmootherConfig {
  optional double delta_s = 1 [default = 0.1];

  optional int32 max_iter = 10 [default = 10000];

  optional double weight_v = 20 [default = 0.0];
  optional double weight_dv = 21 [default = 1.0];
  optional double weight_ddv = 22 [default = 1.0];
  optional double weight_dddv = 23 [default = 1.0];
  optional double weight_ref_v = 24 [default = 1.0];
  optional double weight_slack = 25 [default = 1e10];
}
