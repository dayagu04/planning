syntax = "proto2";

package planning.common;

import "basic_types.proto";
import "st_graph_searcher.proto";

message ApaPathPoint {
  optional double x = 1;
  optional double y = 2;
  optional double heading = 3;
  optional double s = 4;
  optional double kappa = 5;
  optional double t = 6;
  optional double v = 7;
  optional double a = 8;
  optional double lat_buffer = 9;
  optional int32 type = 10;
}

message HistoryApaStatus {
  /*
  0: static
  1: left
  2: right
  */
  optional int32 direction_arrival = 1;
  optional bool is_finish = 2;
}

message AstarNode {
  repeated TrajectoryPoint path_point = 1;
}

message AstarNodeList {
  repeated AstarNode nodes = 1;
}

message SVGraphSpeedConstraint {
  repeated double s = 1;

  repeated double obs_dist = 2;
  // upper v
  repeated double v_upper_bound = 3;

  repeated double a_upper_bound = 4;
  repeated double a_lower_bound = 5;

  repeated double jerk_upper_bound = 6;
  repeated double jerk_lower_bound = 7;
}

enum SpeedProfileType {
  NONE = 0;
  PWJ_QP = 1;
  JLT = 2;
  FALLBAK = 3;
  SV_DP = 4;
}

enum StopSignType {
  STOP_SIGN_NONE = 0;
  USS_POINT_CLOUD_COLLISION = 1;
  PATH_TERMINAL = 2;
  OCC_COLLISION = 3;
  GROUD_LINE_COLLISION = 4;
  POLYGON_OBJECT = 5;
  LIMITER_COLLISION = 6;
  SLOT_POSE_CHANGE = 7;
  REMAIN_DISTANCE = 8;
}

message ApaStopSign {
  optional Pose2d stop_pose = 1;
  optional StopSignType type = 2;
}

message ParkPredictTraj {
  repeated TrajectoryPoint point = 1;
  optional int32 obs_id = 2;
}

message ParkPredictTrajSet {
  repeated ParkPredictTraj trajs = 1;
}

message ApaSpeedDebug {
  optional SVGraphSpeedConstraint dp_speed_constraint = 1;
  optional double ref_cruise_speed = 2;
  optional SVGraphSpeedConstraint qp_speed_constraint = 3;
  repeated StPoint2D dp_profile = 4;
  repeated StPoint2D qp_profile = 5;
  repeated StPoint2D jlt_profile = 6;
  optional SpeedProfileType speed_type = 7;
  repeated ApaStopSign stop_signs = 8;
  optional ParkPredictTrajSet predict_traj_set = 9;
}

message ObstacleDebug {
  repeated Point2d points = 1;
}

message ObstacleListDebug {
  repeated ObstacleDebug obs = 1;
}

message ControlBasedPredictTraj {
  repeated Pose2d points = 1;
}

message SearchTimeForPath {
  repeated double search_time = 1;
  repeated int32 node_pool_size = 2;
  optional double total_search_time = 3;
}

message SearchTrajectoryInfo {
  repeated int32 first_action_gear = 1;
  repeated int32 first_action_gear_request = 2;
  optional double first_seg_path_length = 3;
}

message PathTimeBenchmark {
  optional SearchTimeForPath astar_time = 1;
}

message ApaRemainDist {
  optional double remain_path_dist = 1;
  optional double remain_static_obs_dist = 2;
  optional double remain_dynamic_obs_dist = 3;
  optional double remain_slot_jump_dist = 4;
}

message ApaStuckTime {
  optional double stuck_time = 1;
  optional double stuck_path_time = 2;
  optional double stuck_static_obs_time = 3;
  optional double stuck_dynamic_obs_time = 4;
}

message ApaTerminalErr {
  optional double terminal_x_err = 1;
  optional double terminal_y_err = 2;
  optional double terminal_y_front_err = 4;
  optional double terminal_heading_err = 3;
}

message ApaPlanningSLotInfo {
  optional double every_replan_lat_move_slot_dist = 1;
  optional double success_replan_lat_move_slot_dist = 2;
  optional double every_replan_lon_move_slot_dist = 3;
  optional double success_replan_lon_move_slot_dist = 4;
  optional double slot_occupied_ratio = 5;
  optional double slot_processed_occupied_ratio = 6;
  optional Pose2d slot_origin_pose = 7;
  optional Pose2d origin_target_pose = 8;
  optional Pose2d target_pose = 9;
  repeated Point2d origin_slot_points = 10;
  repeated Point2d target_slot_points = 11;
  repeated Point2d virtual_limiters = 12;
}

message ApaPathDebug {
  optional AstarNodeList astar_node_list = 1;
  optional ObstacleListDebug obs_list = 2;
  optional ControlBasedPredictTraj predict_traj = 3;
  optional PathTimeBenchmark path_time = 4;
  optional HistoryApaStatus history_apa_status = 6;
  optional SearchTrajectoryInfo search_traj_info = 7;
  optional ApaRemainDist remain_dist = 8;
  optional ApaStuckTime stuck_time = 9;
  optional ApaTerminalErr terminal_err = 10;
  optional ApaPlanningSLotInfo slot_info = 11;
}