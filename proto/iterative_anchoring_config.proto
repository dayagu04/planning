syntax = "proto2";

import "fem_pos_deviation_smoother_config.proto";

package planning;

message IterativeAnchoringConfig {
  optional FemPosDeviationSmootherConfig fem_pos_deviation_smoother_config = 1;

  optional double default_bound = 2 [default = 0.2];
  optional double collision_decrease_ratio = 3 [default = 0.5];
  optional double lon_buffer = 4 [default = 0.1];
  optional double lat_buffer = 5 [default = 0.1];
}