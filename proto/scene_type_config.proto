syntax = "proto2";

option cc_enable_arenas = true;

package planning.common;

enum SceneType {
  NOT_DEFINED = 0;
  HIGHWAY = 1;
  PARKING_APA = 2;
  HPP = 3;
  RADS = 4;
}

message ModuleList {
  repeated string module_list = 1;
}

message SceneTypeConfig {
  required string default_scene_type = 1;
  map<string, ModuleList> module_name_map = 2;
}